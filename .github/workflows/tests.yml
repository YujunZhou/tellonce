name: tests

# CI for the shared-core (mechanism C) layout: one canonical lib/ + per-variant
# pt_platform.py, generated into copilot/lib/ via scripts/sync-variants.sh.
#
# Windows-safe tests run on every OS. The POSIX-only suites (which use python3 /
# fcntl / flock and assert POSIX path shapes) plus the codex unittest suite and
# the cross-variant parity check run on Linux + macOS.

on:
  push:
    branches: [main, "refactor/**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.12"]
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml pytest

      - name: Compile all core modules
        run: python -m compileall -q lib copilot/lib codex/codex_preftrack

      # Import-smoke: compileall only parses; version-dependent constructs like
      # un-futured `str | None` annotations explode at IMPORT time on the
      # matrix floor (this caught nothing < the v1.1.0 retrieve_inject bug).
      # HOME is pointed at a temp dir to isolate import-time side effects.
      - name: Import-smoke every module on this Python
        if: runner.os != 'Windows'
        run: |
          export HOME="$(mktemp -d)"
          fail=0
          for d in lib copilot/lib; do
            for f in "$d"/*.py; do
              base="$(basename "$f" .py)"
              case "$base" in conftest|test_*) continue;; esac
              if ! (cd "$d" && python -c "import ${base}") 2>err.txt; then
                echo "::error::import failed: $f"; cat err.txt; fail=1
              fi
            done
          done
          # codex_preftrack uses package-relative imports — import via package.
          for f in codex/codex_preftrack/*.py; do
            base="$(basename "$f" .py)"
            case "$base" in conftest|test_*|__init__|__main__) continue;; esac
            if ! (cd codex && python -c "import codex_preftrack.${base}") 2>err.txt; then
              echo "::error::import failed: $f"; cat err.txt; fail=1
            fi
          done
          exit $fail

      # --- Windows-safe tests (run on every OS) ---
      - name: Copilot variant smoke
        run: python -m pytest copilot/lib/test_smoke.py -q

      - name: Root Windows-safe tests
        run: |
          python lib/test_deterministic_block.py
          python lib/test_rule_params.py
          python lib/test_threshold_advisor.py

      # --- POSIX-only suites + codex + parity (Linux/macOS) ---
      - name: Root POSIX-only tests
        if: runner.os != 'Windows'
        run: |
          fail=0
          for t in test_path_config test_auto_light_entry test_b4_blocking test_verify_retry_shadow test_chaos_fault_injection; do
            echo "::group::$t"
            python "lib/$t.py" || { echo "::error::FAILED $t"; fail=1; }
            echo "::endgroup::"
          done
          exit $fail

      - name: Codex test suite
        if: runner.os != 'Windows'
        working-directory: codex
        run: python -m pytest tests/test_core.py -q

      - name: Cross-variant parity check
        if: runner.os != 'Windows'
        run: bash scripts/parity-check.sh

  shell-lint:
    name: shell syntax (bash -n)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n all shell scripts
        run: |
          status=0
          while IFS= read -r -d '' f; do
            bash -n "$f" || { echo "SYNTAX FAIL: $f"; status=1; }
          done < <(find . -name '*.sh' -not -path './.git/*' -print0)
          exit $status
