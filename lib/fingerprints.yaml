# Preference-tracker Fingerprint Library v1
# Loaded at runtime by lib/retrieve_inject.py + lib/verify_compliance.py via path_config.
#
# Semantics:
#   triggers (any-of): 用户 message 或 project context 包含任一词 → force include atomic_id
#   triggers_pattern: regex 模式, multi-line 匹配
#   enforcement: deterministic | semantic_judge | soft_reminder
#   priority: critical | high | normal
#   action: 短描述 fp 该 force apply 什么 (对 hook 提示)
#
# 取 20 条最高价值 deterministic rule 开头. 非 deterministic 的不放这里.

fingerprints:

  # --- Language / output format ---

  lang-pref-001:
    desc: "给用户看的用中文, 交付物外部读者用英文"
    triggers_force_en:
      - "paper"
      - "appendix"
      - "rebuttal"
      - "camera-ready"
      - "manuscript"
      - "preprint"
      - "external reviewer"
      - "for reviewer"
    triggers_force_zh:
      - "给我看"
      - "给用户看"
      - "给你用户"
      - "response to user"
      - "回复"
      - "解释一下"
    enforcement: deterministic
    priority: critical

  lang-pit-001:
    desc: "自主执行后写 summary/report/audit 不默认英文"
    triggers:
      - "summary.md"
      - "status.md"
      - "report.md"
      - "audit.md"
      - "final.md"
    enforcement: deterministic
    priority: high
    action: "写这类 doc 时必须中文 (除非是 paper 外部)"

  # --- MD formatting traps ---

  fmt-pit-001:
    desc: "嵌套 ``` 必须 4+ 反引号包裹"
    triggers_pattern: '```[\s\S]*?```'
    enforcement: deterministic
    priority: high
    action: "写 MD 含代码片段时外层用 ```` or ~~~~"

  # --- File path / location ---

  oth-pref-001:
    desc: "progress/status MD 不写 /tmp, 写项目内"
    triggers:
      - "progress.md"
      - "status.md"
      - "report.md"
      - "summary.md"
      - "OVERNIGHT"
      - "FINAL_BEST"
    enforcement: deterministic
    priority: high
    action: "路径必须在 project dir, 不 /tmp"

  # --- Session / handoff ---

  wrt-pref-015:
    desc: "Session handoff 用 6-section 格式, 不省 token"
    triggers:
      - "handoff"
      - "SESSION_HANDOFF"
      - "compact"
      - "next session"
      - "handover"
    enforcement: deterministic
    priority: critical
    action: "写 handoff 必走 0-6 section 结构 + verbose"

  wrt-pref-014:
    desc: "给 user 的文档 verbose clear > 省 token"
    triggers:
      - "proposal"
      - "handoff"
      - "report"
      - "blueprint"
    enforcement: deterministic
    priority: high

  wrt-pref-013:
    desc: "每个术语/ id/ 数字首次出现带解释"
    triggers:
      - "blueprint"
      - "manifest"
      - "atomic_id"
    enforcement: deterministic
    priority: high
    action: "引用内部 ID 时必须 + 解释 (3 元组: 是啥/为啥提/影响啥)"

  # --- Experiment lifecycle ---

  exp-pit-001:
    desc: "API 大规模调用前 preflight credit + 小样本预检"
    triggers:
      - "全跑"
      - "full run"
      - "--workers"
      - "parallel=4"
    enforcement: deterministic
    priority: high
    action: "跑之前必须 balance check + 3 sample preflight"

  exp-pref-001:
    desc: "大规模实验前 2-3 样本预检, 不截断"
    triggers:
      - "full run"
      - "scale up"
    enforcement: deterministic
    priority: high

  # --- Workflow ---

  wf-pit-008:
    desc: "Background probe pivot 后必须 kill 原 task"
    triggers:
      - "background"
      - "run_in_background"
      - "nohup"
      - "bg &"
    enforcement: deterministic
    priority: high
    action: "pivot 或 blocker 后 kill 所有已启动 bg process"

  wf-pit-012:
    desc: "Propose plan 不能同 response 自启 autonomous"
    triggers:
      - "开始跑"
      - "直接执行"
      - "autonomous block"
      - "跑一夜"
    enforcement: deterministic
    priority: critical
    action: "必须 explicit go 信号再启 multi-hour block"

  wf-pref-027:
    desc: "evolving artifact 必须 versioned, 永不 overwrite"
    triggers:
      - "manifest.json"
      - "schema"
    enforcement: deterministic
    priority: high
    action: "改前必须 cp 到 _vN.json"

  # --- Communication ---

  comm-pref-006:
    desc: "Never use system-internal invented jargon in user-facing replies"
    # Heuristic: function-shaped tokens like `run_one_V3` / `do_X_v2` —
    # internal versioned identifiers that mean nothing to a non-developer
    # reader. Tune per-project by adding tokens to the user whitelist.
    triggers_pattern: '\b[a-z]+_[a-z_]+_[Vv]\d+\b'
    enforcement: deterministic
    priority: high
    action: "user-facing 里函数名 / class 名必须翻译成描述"

  comm-pit-003:
    desc: "末尾 bullet 不重复, 俄罗斯套娃 antipattern"
    triggers_pattern: '(\n-\s.+\n){3,}(\n-\s.+\n){3,}'
    enforcement: deterministic
    priority: normal
    action: "response 末尾 bullet 只写一次"

  comm-pref-010:
    desc: "数据/rule drafts/结果写文件给路径"
    triggers:
      - "draft rule"
      - "rule library"
      - "结果"
      - "数据"
    enforcement: deterministic
    priority: high
    action: "不用 bash print, 写文件"

  # --- Writing ---

  wrt-pref-012:
    desc: "Paper-style writing 只写 best result, exploration 多试不写 null finding"
    triggers:
      - "paper sec"
      - "论文章节"
      - "ablation"
    enforcement: deterministic
    priority: high
    action: "写 paper 时 filter exploration / null finding"

  wrt-pref-011:
    desc: "Figure/table 必须 anchor 到 claim"
    triggers:
      - "figure inventory"
      - "table inventory"
      - "paper figure"
    enforcement: deterministic
    priority: high

# Notes for forks:
#   - The rules above are kept generic. To add project-specific rules
#     (your own task IDs, internal jargon, paper section names, etc.),
#     create a sibling memory file under ~/.claude/projects/<cwd>/memory/
#     and reference it via SKILL.md — those are picked up at runtime
#     without modifying this base library.
