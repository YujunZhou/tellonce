# Preference-tracker Fingerprint Library
#
# SHIPPED EMPTY ON PURPOSE. preference-tracker does NOT pre-load anyone's
# personal preference rules. Your rules accumulate as YOU teach the agent
# (the Gate Function records them), and you can hand-author fingerprints here.
#
# To add your own, drop entries under `fingerprints:` here, OR keep a private
# overlay at `fingerprints.user.yaml` (gitignored) — both are merged at load.
#
# Schema (per entry):
#   <atomic_id>:
#     desc: "one-line description"
#     triggers: ["keyword1", "keyword2"]        # any-of substring match
#     triggers_pattern: "regex"                  # optional
#     enforcement: deterministic | semantic_judge | soft_reminder
#     priority: critical | high | normal
#     action: "what to apply when this fires"

fingerprints: {}